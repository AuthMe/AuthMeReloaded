# AuthmeReloaded插件help文件'帮助信息'的简体中文文本配置
# 对应/authme help 或/authme help register指令
# Translated By LASER_ZY
# 2025/10/1
# -------------------------------------------------------
# 帮助信息所使用的文本列表
common:
    header: '==========[ AuthMeReloaded 帮助列表 ]=========='
    optional: '可选参数'
    hasPermission: '已拥有操作权限'
    noPermission: '无操作权限'
    default: '默认'
    result: '当前权限状态'
    defaultPermissions:
        notAllowed: '无权限'
        opOnly: '仅管理员可用'
        allowed: '全体可用'
# -------------------------------------------------------
# 各帮助信息的标题
# 将翻译文本设置为空可以禁用该部分
# 示例如下
#   alternatives: ''
section:
    command: '指令'
    description: '功能描述'
    detailedDescription: '详细说明'
    arguments: '参数'
    permissions: '权限'
    alternatives: '别名'
    children: '子命令'
# -------------------------------------------------------
# 你可以使用以下模板翻译所有指令的数据
# 例如，要翻译/authme reload，需创建一个"authme.reload"部分，如果是/login，则创建"login"部分
# 若命令有参数，可以使用 arg1 来翻译第一个参数， arg2 来翻译第二个参数，依此类推
# 翻译不需要完整；缺失的部分将自动从默认值中获取
# 注意：像"authme"这样的主命令需要放在其子命令（如"authme.reload"）之前
# 示例如下
#authme.reload:
#        description: '重新加载插件'
#        detailedDescription: '重新加载插件你还要我怎么详细描述？'
#        arg1:
#            label: 'XX'
#            description: 'XX'
#        arg2:
#            label: 'XX'
#            description: 'XX'
commands:
    authme.register:
        description: '注册玩家档案'
        detailedDescription: '为指定的玩家注册账号档案并设置登录密码'
        arg1:
            label: '玩家'
            description: '玩家名称'
        arg2:
            label: '密码'
            description: '登录密码'
    authme.unregister:
        description: '注销玩家档案'
        detailedDescription: '为指定玩家注销账号档案'
        arg1:
            label: '玩家'
            description: '玩家名称'
    authme.forcelogin:
        description: '强制玩家登录'
